server {
    listen 443 ssl;
    server_name example.com;

    # EXPECTED: TLS | 1.0,1.1,1.2,1.3 | - | high | quantum-vulnerable
    # BAD: includes deprecated TLSv1 and TLSv1.1
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;

    # EXPECTED: RC4,DES | - | - | critical | broken
    # BAD: includes weak ciphers RC4 and DES-CBC3-SHA
    ssl_ciphers 'ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:RC4:DES-CBC3-SHA:!aNULL:!eNULL';

    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # EXPECTED: certificate | - | - | info | quantum-vulnerable
    ssl_certificate /etc/ssl/certs/server.crt;
    ssl_certificate_key /etc/ssl/private/server.key;

    location / {
        proxy_pass http://backend:8080;
    }
}

server {
    listen 8443 ssl;
    server_name secure.example.com;

    # EXPECTED: TLS | 1.2,1.3 | - | info | quantum-safe
    # GOOD: only modern TLS
    ssl_protocols TLSv1.2 TLSv1.3;

    # GOOD: strong cipher suite
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    ssl_certificate /etc/ssl/certs/secure.crt;
    ssl_certificate_key /etc/ssl/private/secure.key;

    location / {
        proxy_pass http://backend:8080;
    }
}
